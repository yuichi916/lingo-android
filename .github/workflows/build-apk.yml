name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Allow the build to create/update the rolling "latest" release with the APK.
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle 8.7
        run: |
          curl -sL https://services.gradle.org/distributions/gradle-8.7-bin.zip -o gradle.zip
          unzip -q gradle.zip -d "$HOME/gradle"
          echo "$HOME/gradle/gradle-8.7/bin" >> "$GITHUB_PATH"

      - name: Ensure stable debug keystore
        run: |
          if [ ! -f app/debug.keystore ]; then
            keytool -genkeypair -v -keystore app/debug.keystore \
              -storepass android -keypass android -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
            echo "GENERATED_KEYSTORE=1" >> "$GITHUB_ENV"
          fi

      - name: Upload generated keystore (commit it for stable signing)
        if: env.GENERATED_KEYSTORE == '1'
        uses: actions/upload-artifact@v4
        with:
          name: debug-keystore
          path: app/debug.keystore

      - name: Build debug APK
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p out
          cp app/build/outputs/apk/debug/app-debug.apk out/lingo.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lingo-apk
          path: out/lingo.apk
          if-no-files-found: error

      - name: Publish to rolling release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Lingo (latest build)
          files: out/lingo.apk
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
